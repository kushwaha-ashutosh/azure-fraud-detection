name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install azure-functions azure-servicebus azure-storage-blob azure-cosmos azure-identity azure-keyvault-secrets xgboost scikit-learn pandas numpy joblib faker pytest black flake8 isort python-dotenv optuna

      - name: Lint with flake8
        run: |
          flake8 simulator/ batch_etl/ orchestration/ --max-line-length=120 --ignore=E501,W503

      - name: Check formatting with black
        run: |
          black --check simulator/ batch_etl/ orchestration/ --line-length=120

      - name: Run tests
        env:
          SERVICEBUS_CONNECTION_STRING: ${{ secrets.SERVICEBUS_CONNECTION_STRING }}
          STORAGE_CONNECTION_STRING: ${{ secrets.STORAGE_CONNECTION_STRING }}
          COSMOS_ENDPOINT: ${{ secrets.COSMOS_ENDPOINT }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          pytest tests/ -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ML inference Function
        uses: Azure/functions-action@v1
        with:
          app-name: fraud-ml-inference
          package: functions/ml_inference
          scm-do-build-during-deployment: true

      - name: Deploy stream processor Function
        uses: Azure/functions-action@v1
        with:
          app-name: fraud-stream-processor
          package: functions/stream_processor
          scm-do-build-during-deployment: true

      - name: Deploy realtime action Function
        uses: Azure/functions-action@v1
        with:
          app-name: fraud-realtime-action
          package: functions/realtime_action
          scm-do-build-during-deployment: true